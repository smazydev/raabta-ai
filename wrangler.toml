# Cloudflare Workers — Next.js via OpenNext (output: .open-next/)
# Worker `name` and WORKER_SELF_REFERENCE `service` must match your deployed script name.
#
# Wrangler runs [build].command before upload so `.open-next/worker.js` exists.
# Do not run bare `wrangler deploy` without a prior build unless this block is present.
name = "raabta-ai"
main = ".open-next/worker.js"

[build]
command = "npx opennextjs-cloudflare build"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "raabta-ai"
